version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_MIRROR: "true"  # 本地开发使用阿里云镜像加速
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173
      - MAX_FILE_SIZE_MB=50
      - JOB_TTL_HOURS=1
    volumes:
      - /tmp/docconv:/tmp/docconv
